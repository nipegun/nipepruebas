<%+themes/saas-dark/header%>
<div class="login-shell">
  <section class="login-card">
    <header class="login-card__header">
      <h1>OpenWrt</h1>
      <p><%= translate("Authorization Required") %></p>
    </header>
    <form class="login-card__form" method="post">
      <div class="cbi-map">
        <div class="cbi-section">
          <div class="cbi-section-node">
            <div class="cbi-value">
              <label class="cbi-value-title" for="luci_username"><%= translate("Username") %></label>
              <div class="cbi-value-field">
                <input name="luci_username" id="luci_username" type="text" autocomplete="username" value="<%= duser or '' %>" />
              </div>
            </div>
            <div class="cbi-value">
              <label class="cbi-value-title" for="luci_password"><%= translate("Password") %></label>
              <div class="cbi-value-field">
                <input name="luci_password" id="luci_password" type="password" autocomplete="current-password" />
              </div>
            </div>
          </div>
        </div>
      </div>
      <% if fuser then %>
        <div class="alert-message error">
          <%= translate("Invalid username and/or password! Please try again.") %>
        </div>
      <% end %>
      <button class="btn cbi-button-positive important" type="submit"><%= translate("Log in") %></button>
    </form>
    <footer class="login-card__footer">
      <small>&copy; <%= os.date('%Y') %> OpenWrt Project</small>
    </footer>
  </section>
</div>
<%+themes/saas-dark/footer%>
